{% load static %}
<form action="{% url 'form_view' %}" method = "POST" id="create-post" class = 'hidden form-new-post' enctype="multipart/form-data">
    <div id="close-form" class="close-form close-form-btn">
        <img src="{% static 'post_app/images/posts_images/cross.svg' %}">
    </div>

    <p class="title-form">Створення публікації</p>

    <div class="container-form">
        <div class="form-group">
            <label>{{ form.title.label_tag }}</label>
        
            {{ form.title }}
        </div>

        <div class="form-group">
            <label>{{ form.topic.label_tag }}</label>
        
            {{ form.topic }}
        </div>

        <div class="tags-container">
            {% for checkbox in form.tags %}
                <div class="custom-tag-label" id="custom-tag">
                    {{ checkbox.tag }}
                    <span class="tag-pill">{{ checkbox.choice_label }}</span>
                </div>
            {% endfor %}

            <div id="custom-tags"></div>

            <div class="plus-div" id="add-custom-tag">
                <img src="{% static 'post_app/images/posts_images/plus-icon.svg' %}" alt="+">
            </div>
        </div>

        <div class="content-block">
            {{ form.content }}
            <div class="show-tags"></div>
        </div>

        <div class="form-group">
            <label>Посилання</label>

            <div class="new-link">
                <div id="links-list" class="links-list">

                    <div class="input-block">
                        <input class="input-link" type="url" name="links" placeholder="Додайте посилання">

                        <div class="plus-div">
                            <img class="plus-icon add-new-link" src="{% static 'post_app/images/posts_images/plus-icon.svg' %}" alt="+">
                        </div>
                    </div>

                

                </div>                
            </div>
        </div>

        <div id="image-preview-container" class="image-preview-container"></div>
    </div>

    <div class="bottom-buttons">
        <label for= "id_images" class="image-upload-label">
            <img src="{% static 'post_app/images/posts_images/images_icon.svg' %}" alt="Додати зображення">
        </label>

        {{ form.images }}

        <button class="send-data" type="submit">
            <span>Публікація</span>
            <img src="{% static 'post_app/images/posts_images/send-icon.svg' %}">
        </button>
    </div>
</form>
