{% load static %}

{% for group in group_chat %}
    <div class="block-card" data-chat-id="{{ group.id }}"  data-chat-type="group" data-chat-title="{{ group.name }}">
        <div class="avatar-wrapper">
            <img src="{% static 'chat_app/images/alert_conteiner/group-avatar.svg' %}" alt="avatar-icon">
        </div>

        <div class="text-data">
            <div class="top-data">
                <p class="nickname-card">{{ group.name }}</p>
                <p class="card-time">{{ group.last_message_data|date:"H:i" }}</p>
            </div>

            <div class="bottom-data">
                <p class="last-message-text">{{ group.last_message_text }}</p>
            </div>
        </div>
    </div>
{% endfor %}
