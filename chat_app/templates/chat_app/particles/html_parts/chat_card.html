{% load static %}

<div class="block-card" data-chat-user="{{ chat_user.id }}" data-user-id="{{ chat_user.id }}" data-chat-username="{{ chat_user.userprofile.pseudonym }}" >
    <div class="avatar-wrapper">
        <img src="{% static 'chat_app/images/alert_conteiner/example-message.svg' %}" alt="avatar-icon" class="avatar-img">
        <span class="status-indicator"></span>
    </div>

    <div class="text-data">
        <div class="top-data">
            <p class="nickname-card">{{ chat_user.userprofile.pseudonym }}</p>

            <p class="card-time">Зараз</p>
        </div>

        <div class="bottom-data">
            <p>Новий чат</p>
        </div>
    </div>

</div>
